<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập — JiraBot</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0b0d14;
            --surface: rgba(255, 255, 255, 0.035);
            --surface-hover: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.08);
            --text: #e2e8f0;
            --muted: #7c8db5;
            --purple: #8b5cf6;
            --purple-glow: rgba(139, 92, 246, 0.35);
            --indigo: #6366f1;
            --red: #f43f5e;
            --green: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(circle 600px at 30% 20%, rgba(139, 92, 246, 0.1), transparent),
                radial-gradient(circle 500px at 70% 80%, rgba(99, 102, 241, 0.08), transparent);
        }

        .login-card {
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            padding: 40px 32px;
            z-index: 1;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
            transition: min-height 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 28px;
        }

        .logo {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--purple), var(--indigo));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            margin-bottom: 16px;
            box-shadow: 0 0 25px var(--purple-glow);
        }

        .logo-title {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #fff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-subtitle {
            font-size: 13px;
            color: var(--muted);
            margin-top: 4px;
        }

        /* Tab switcher */
        .tab-switcher {
            display: flex;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 28px;
            border: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            padding: 9px 16px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            background: transparent;
            color: var(--muted);
            border-radius: 9px;
            cursor: pointer;
            transition: all 0.25s;
            font-family: inherit;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #7c3aed, #6366f1);
            color: #fff;
            box-shadow: 0 2px 10px rgba(124, 58, 237, 0.35);
        }

        /* Form panels */
        .form-panel {
            display: none;
            animation: panelIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .form-panel.active {
            display: block;
        }

        @keyframes panelIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 14px;
            color: var(--text);
            font-family: inherit;
            transition: all 0.2s;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--purple);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
            background: rgba(0, 0, 0, 0.3);
        }

        .form-input::placeholder {
            color: rgba(124, 141, 181, 0.5);
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #7c3aed, #6366f1);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
            font-family: inherit;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.45);
        }

        .btn-submit:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .hint-text {
            font-size: 12px;
            color: var(--muted);
            text-align: center;
            margin-top: 16px;
            line-height: 1.6;
        }

        .hint-text a {
            color: var(--purple);
            text-decoration: none;
            cursor: pointer;
        }

        .hint-text a:hover {
            text-decoration: underline;
        }

        /* Toast notifications */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid var(--border);
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            animation: toastIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            backdrop-filter: blur(8px);
        }

        .toast.error { border-left: 4px solid var(--red); }
        .toast.success { border-left: 4px solid var(--green); }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(12px) scale(0.95); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .info-note {
            background: rgba(139, 92, 246, 0.08);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 12px;
            color: #a78bfa;
            margin-bottom: 18px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-wrapper">
            <div class="logo">⏱</div>
            <div class="logo-title">JiraBot</div>
            <div class="logo-subtitle">Hệ thống báo cáo hiệu quả công việc</div>
        </div>

        <!-- Tab switcher -->
        <div class="tab-switcher">
            <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Đăng nhập</button>
            <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Đăng ký</button>
        </div>

        <!-- Login panel -->
        <div class="form-panel active" id="panel-login">
            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="login-email">Email</label>
                    <div class="input-wrapper">
                        <input class="form-input" type="email" id="login-email" required placeholder="nhanvien@aconneri.vn" autocomplete="username">
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 24px;">
                    <label class="form-label" for="login-password">Mật khẩu</label>
                    <div class="input-wrapper">
                        <input class="form-input" type="password" id="login-password" required placeholder="••••••••" autocomplete="current-password">
                    </div>
                </div>

                <button class="btn-submit" type="submit" id="btn-login">
                    <span>Đăng nhập</span>
                </button>
            </form>

            <p class="hint-text">
                Chưa có tài khoản? <a onclick="switchTab('register')">Đăng ký ngay</a>
            </p>
        </div>

        <!-- Register panel -->
        <div class="form-panel" id="panel-register">
            <div class="info-note">
                💡 Sau khi đăng ký, hãy cập nhật thông tin Jira (Token, Cloud ID...) trong phần <strong>Cài đặt cá nhân</strong> để sử dụng đầy đủ tính năng.
            </div>

            <form id="register-form">
                <div class="form-group">
                    <label class="form-label" for="reg-email">Email</label>
                    <div class="input-wrapper">
                        <input class="form-input" type="email" id="reg-email" required placeholder="nhanvien@aconneri.vn" autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="reg-password">Mật khẩu</label>
                    <div class="input-wrapper">
                        <input class="form-input" type="password" id="reg-password" required placeholder="••••••••" autocomplete="new-password" minlength="6">
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 24px;">
                    <label class="form-label" for="reg-confirm">Xác nhận mật khẩu</label>
                    <div class="input-wrapper">
                        <input class="form-input" type="password" id="reg-confirm" required placeholder="••••••••" autocomplete="new-password">
                    </div>
                </div>

                <button class="btn-submit" type="submit" id="btn-register">
                    <span>Tạo tài khoản</span>
                </button>
            </form>

            <p class="hint-text">
                Đã có tài khoản? <a onclick="switchTab('login')">Đăng nhập</a>
            </p>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script>
        function showToast(message, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <span>${type === 'success' ? '✅' : '❌'}</span>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.4s';
                setTimeout(() => toast.remove(), 400);
            }, 4000);
        }

        function switchTab(tab) {
            document.getElementById('tab-login').classList.toggle('active', tab === 'login');
            document.getElementById('tab-register').classList.toggle('active', tab === 'register');
            document.getElementById('panel-login').classList.toggle('active', tab === 'login');
            document.getElementById('panel-register').classList.toggle('active', tab === 'register');
        }

        // Login
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('btn-login');

            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div><span>Đang kết nối...</span>';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.error || 'Đăng nhập không thành công.');
                }

                showToast('Đăng nhập thành công! Đang chuyển hướng...', 'success');
                setTimeout(() => { window.location.href = '/'; }, 1000);
            } catch (err) {
                showToast(err.message, 'error');
                btn.disabled = false;
                btn.innerHTML = '<span>Đăng nhập</span>';
            }
        });

        // Register
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-confirm').value;
            const btn = document.getElementById('btn-register');

            if (password !== confirm) {
                return showToast('Mật khẩu xác nhận không khớp.', 'error');
            }

            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div><span>Đang tạo tài khoản...</span>';

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.error || 'Đăng ký không thành công.');
                }

                showToast('Đăng ký thành công! Đang chuyển hướng...', 'success');
                setTimeout(() => { window.location.href = '/'; }, 1500);
            } catch (err) {
                showToast(err.message, 'error');
                btn.disabled = false;
                btn.innerHTML = '<span>Tạo tài khoản</span>';
            }
        });
    </script>
</body>
</html>
