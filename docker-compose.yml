services:
  jirabot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jirabot
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      # Persist SQLite database outside container
      - jirabot_data:/app/data
      # Persist PM2/app logs
      - jirabot_logs:/app/logs
    env_file:
      - .env          # sẽ không commit, tạo thủ công trên server
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/login.html', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  jirabot_data:
    driver: local
  jirabot_logs:
    driver: local
