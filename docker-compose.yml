services:
  jirabot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jirabot
    restart: unless-stopped
    ports:
      - "3344:3344"
    env_file:
      - .env          # tạo thủ công trên server, KHÔNG commit
    volumes:
      # Persist SQLite database outside container
      - jirabot_data:/app/data
      # Persist app logs
      - jirabot_logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3344/login.html', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  jirabot_data:
    driver: local
  jirabot_logs:
    driver: local
